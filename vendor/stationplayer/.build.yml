image: alpine/edge
packages:
  - bash
  - curl
  - rust
  - cargo
  - git
  - jadx
  - openssh-client
  - python3
  - uv

sources:
  - git@git.sr.ht:~gotlou/stationplayer
  
secrets:
  - 11b91430-0b4c-439c-b385-c92968d68b1b

environment:
  GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes
  STATIONPLAYER_REGENERATE_CONSTS: 1

tasks:  
  - generate-and-commit-if-needed: |
      set -eux
      cd stationplayer

      # Only regenerate if metadata hasn't been updated in 29+ days.
      if [ ! -f metadata/app_constants.json ]; then
        echo "=== metadata/app_constants.json missing — must run extraction ==="
      else
        NOW=$(date +%s)
        LAST_COMMIT=$(git log -1 --format=%ct -- metadata/app_constants.json)
        AGE_DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))
        echo "metadata/app_constants.json last committed ${AGE_DAYS} days ago"

        if [ "$AGE_DAYS" -lt 29 ]; then
          echo "=== Metadata is fresh (< 29 days) — skipping regeneration ==="
          exit 0
        fi

        echo "=== Metadata is stale (${AGE_DAYS} days) — running credential extraction + consts regeneration ==="
      fi
      cargo build 2>&1

      if git diff --quiet src/consts.rs metadata; then
        echo "src/consts.rs is unchanged — nothing to commit."
        exit 0
      fi

      # Extract version for a meaningful commit message.
      VERSION=$(python3 -c \
        "import json; print(json.load(open('metadata/app_constants.json'))['app_constants']['version_name'])")

      git config user.email  "builds@sr.ht"
      git config user.name   "sourcehut build bot"

      git add src/consts.rs metadata/app_constants.json
      git commit -m "chore: bump app constants to v${VERSION}

      Auto-generated by sourcehut build — APK metadata changed since last
      successful extraction.

      [skip ci]"
      git push origin main

      echo "=== Pushed commit with bumped constants (v${VERSION}) ==="

triggers:
  - action: email
    condition: always
    to: ~gotlou

[package]
name = "stationplayer"
version = "0.1.0"
edition = "2024"

[lib]
name = "stationplayer"
crate-type = ["cdylib", "rlib"]

[workspace]
members = ["smoke-client"]
resolver = "3"

[dependencies]
anyhow = "1.0.102"
base64 = "0.22.1"
chrono = { version = "0.4.44", features = ["serde"] }
hex = "0.4.3"
rand = "0.10.0"
reqwest = { version = "0.13.2", default-features = false, features = ["gzip", "json", "rustls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_urlencoded = "0.7.1"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "sync", "time"] }
uniffi = "0.31.0"
uuid = { version = "1.22.0", features = ["v4"] }

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21.1"
rustls-platform-verifier = "0.6.2"

[build-dependencies]
uniffi = { version = "0.31.0", features = ["build"] }
